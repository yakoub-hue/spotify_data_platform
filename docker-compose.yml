version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1-python3.11
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: 'it4UGY0iq4tigQyJWTnC-Yc0XhkcTbSX3yqQgmizdSU='
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    PYTHONPATH: /opt/airflow/src
    SPOTIFY_POSTGRES_CONN: postgresql+psycopg2://spotify:spotify@postgres/spotify
    MINIO_ENDPOINT: http://minio:9000
    MINIO_ACCESS_KEY: minioadmin
    MINIO_SECRET_KEY: minioadmin
    REDIS_URL: redis://redis:6379/1
  volumes:
    - ./dags:/opt/airflow/dags
    - ./plugins:/opt/airflow/plugins
    - ./src:/opt/airflow/src
    - ./tests:/opt/airflow/tests
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:

  # ─────────────────────────────────────────
  # INFRASTRUCTURE
  # ─────────────────────────────────────────

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql/init_spotify_db.sql:/docker-entrypoint-initdb.d/01_spotify.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
      start_period: 5s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/spotify-parquet || true;
      mc mb local/spotify-checkpoints || true;
      mc mb local/spotify-audio || true;
      mc mb local/labels-raw || true;
      echo 'Buckets MinIO initialisés';
      "

  # ─────────────────────────────────────────
  # AIRFLOW
  # ─────────────────────────────────────────

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      retries: 5
      start_period: 30s

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--hostname", "$${HOSTNAME}"]
      interval: 30s
      retries: 5
      start_period: 30s

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname Admin \
          --role Admin \
          --email admin@spotify.local \
          --password admin
        airflow connections add spotify_postgres \
          --conn-type postgres \
          --conn-host postgres \
          --conn-schema spotify \
          --conn-login spotify \
          --conn-password spotify \
          --conn-port 5432
        airflow connections add spotify_redis \
          --conn-type redis \
          --conn-host redis \
          --conn-port 6379 \
          --conn-extra '{"db": 1}'
        airflow connections add spotify_minio \
          --conn-type aws \
          --conn-extra '{"endpoint_url": "http://minio:9000", "aws_access_key_id": "minioadmin", "aws_secret_access_key": "minioadmin"}'
        echo "Airflow initialisé avec succès"

  # ─────────────────────────────────────────
  # KAFKA (Phase 2 — décommenter jeudi matin)
  # ─────────────────────────────────────────

  kafka-1:
     image: confluentinc/cp-kafka:7.6.0
     hostname: kafka-1
     environment:
       KAFKA_NODE_ID: 1
       KAFKA_PROCESS_ROLES: broker,controller
       KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
       KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092,PLAINTEXT_HOST://localhost:29092
       KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
       KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
       KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
       KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9095,3@kafka-3:9097
       KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
       KAFKA_DEFAULT_REPLICATION_FACTOR: 3
       KAFKA_MIN_INSYNC_REPLICAS: 2
       CLUSTER_ID: Pqz2ycuaRRSTnlpeQc-YPw
     volumes:
       - kafka-1-data:/var/lib/kafka/data
     ports:
       - "9092:9092"
       - "29092:29092"

  kafka-2:
     image: confluentinc/cp-kafka:7.6.0
     hostname: kafka-2
     environment:
       KAFKA_NODE_ID: 2
       KAFKA_PROCESS_ROLES: broker,controller
       KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9094,CONTROLLER://0.0.0.0:9095,PLAINTEXT_HOST://0.0.0.0:29094
       KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:9094,PLAINTEXT_HOST://localhost:29094
       KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
       KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
       KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
       KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9095,3@kafka-3:9097
       CLUSTER_ID: Pqz2ycuaRRSTnlpeQc-YPw
     volumes:
       - kafka-2-data:/var/lib/kafka/data
     ports:
       - "29094:29094"
  kafka-3:
     image: confluentinc/cp-kafka:7.6.0
     hostname: kafka-3
     environment:
       KAFKA_NODE_ID: 3
       KAFKA_PROCESS_ROLES: broker,controller
       KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9096,CONTROLLER://0.0.0.0:9097,PLAINTEXT_HOST://0.0.0.0:29096
       KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:9096,PLAINTEXT_HOST://localhost:29096
       KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
       KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
       KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
       KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9095,3@kafka-3:9097
       CLUSTER_ID: Pqz2ycuaRRSTnlpeQc-YPw
     volumes:
       - kafka-3-data:/var/lib/kafka/data
     ports:
     - "29096:29096"
  kafka-ui:
     image: provectuslabs/kafka-ui:latest
     depends_on:
       - kafka-1
       - kafka-2
       - kafka-3
     ports:
       - "8090:8080"
     environment:
       KAFKA_CLUSTERS_0_NAME: spotify-local
       KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:9092,kafka-2:9094,kafka-3:9096

  kafka-init:
     image: confluentinc/cp-kafka:7.6.0
     depends_on:
       - kafka-1
       - kafka-2
       - kafka-3
     entrypoint: >
       /bin/sh -c "
       sleep 15;
       kafka-topics --create --if-not-exists --bootstrap-server kafka-1:9092 --topic listening_events --partitions 6 --replication-factor 3 --config retention.ms=604800000;
       kafka-topics --create --if-not-exists --bootstrap-server kafka-1:9092 --topic p2p_network_events --partitions 6 --replication-factor 3;
       kafka-topics --create --if-not-exists --bootstrap-server kafka-1:9092 --topic catalog_updates --partitions 3 --replication-factor 3 --config cleanup.policy=compact;
       kafka-topics --create --if-not-exists --bootstrap-server kafka-1:9092 --topic enriched_events --partitions 6 --replication-factor 3;
       kafka-topics --create --if-not-exists --bootstrap-server kafka-1:9092 --topic fraud_alerts --partitions 3 --replication-factor 3;
       kafka-topics --create --if-not-exists --bootstrap-server kafka-1:9092 --topic late_listening_events --partitions 3 --replication-factor 3;
       echo 'Topics Kafka créés';
       "

  # ─────────────────────────────────────────
  # SPARK (Phase 2 — décommenter jeudi matin)
  # ─────────────────────────────────────────

  spark-master:
     image: spark:3.5.0
     command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host spark-master --port 7077 --webui-port 8888
     environment:
       SPARK_MODE: master
       SPARK_MASTER_PORT: 7077
       SPARK_MASTER_WEBUI_PORT: 8888
     ports:
       - "7077:7077"
       - "8888:8888"
     volumes:
       - ./spark_jobs:/opt/spark-jobs

  spark-worker-1:
     image: spark:3.5.0
     command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
     environment:
       SPARK_MODE: worker
       SPARK_MASTER_URL: spark://spark-master:7077
       SPARK_WORKER_MEMORY: 2G
       SPARK_WORKER_CORES: 2
     depends_on:
       - spark-master
     volumes:
       - ./spark_jobs:/opt/spark-jobs

volumes:
  postgres-data:
  minio-data:
  airflow-logs:
  kafka-1-data:
  kafka-2-data:
  kafka-3-data:
